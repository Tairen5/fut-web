<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 1050" width="680" height="1050">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#080808"/>
      <stop offset="50%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#060606"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="680" height="1050" fill="url(#bg)" rx="4"/>

  <!-- Lines style -->
  <g fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="1.5">

    <!-- Outer border -->
    <rect x="40" y="40" width="600" height="970" rx="2"/>

    <!-- Halfway line -->
    <line x1="40" y1="525" x2="640" y2="525"/>

    <!-- Center circle -->
    <circle cx="340" cy="525" r="91.5"/>
    <!-- Center dot -->
    <circle cx="340" cy="525" r="3" fill="rgba(255,255,255,0.35)"/>

    <!-- Top penalty area -->
    <rect x="198" y="40" width="284" height="165"/>
    <!-- Top goal area -->
    <rect x="253" y="40" width="174" height="65"/>
    <!-- Top penalty arc -->
    <path d="M 277 205 Q 340 245 403 205"/>
    <!-- Top penalty dot -->
    <circle cx="340" cy="132" r="3" fill="rgba(255,255,255,0.35)"/>

    <!-- Bottom penalty area -->
    <rect x="198" y="845" width="284" height="165"/>
    <!-- Bottom goal area -->
    <rect x="253" y="945" width="174" height="65"/>
    <!-- Bottom penalty arc -->
    <path d="M 277 845 Q 340 805 403 845"/>
    <!-- Bottom penalty dot -->
    <circle cx="340" cy="918" r="3" fill="rgba(255,255,255,0.35)"/>

    <!-- Top corner arcs -->
    <path d="M 40 55 Q 55 40 70 40"/>
    <path d="M 610 40 Q 625 40 640 55"/>

    <!-- Bottom corner arcs -->
    <path d="M 40 1025 Q 55 1040 70 1040"/>
    <path d="M 610 1040 Q 625 1040 640 1025"/>

    <!-- Goals -->
    <rect x="270" y="20" width="140" height="20" rx="2"/>
    <rect x="270" y="1010" width="140" height="20" rx="2"/>
  </g>
</svg>
